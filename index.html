<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAL Client Portal</title>
  <meta name="theme-color" content="#1A1A1A">
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1A1A1A;
      color: #FFFFFF;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      color: #D4A574;
      font-size: 2rem;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: #888;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      margin-bottom: 3rem;
    }
    .login-box {
      background: #222;
      padding: 2.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid #333;
    }
    .login-box h2 {
      color: #D4A574;
      font-size: 1rem;
      letter-spacing: 0.2em;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    input {
      width: 100%;
      background: #1A1A1A;
      border: 1px solid #444;
      color: #fff;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      font-family: Georgia, serif;
      font-size: 0.9rem;
    }
    input::placeholder { color: #666; }
    button {
      width: 100%;
      background: #D4A574;
      color: #1A1A1A;
      border: none;
      padding: 0.9rem;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { background: #c49060; }
  </style>
</head>
<body>
  <div class="logo">P.A.L.</div>
  <div class="tagline">PREMIUM ACTIVITIES & LIFESTYLE</div>
  <div class="login-box">
    <h2>CLIENT PORTAL</h2>
    <input type="email" placeholder="Email address" id="email">
    <input type="password" placeholder="Password" id="password">
    <button onclick="login()">ACCESS MY PORTAL</button>
  </div>
  <script>
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (email && password) {
        alert('Portal coming soon. Welcome to PAL.');
      }
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
